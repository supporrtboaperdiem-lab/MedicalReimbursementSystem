{% extends "base.html" %}

{% block title %}Add Service{% endblock %}

{% block content %}

<h1>Add Service to Price List</h1>

<p>
    <strong>Institution:</strong> {{ batch.institution.name }}<br>
    <strong>Batch:</strong> {{ batch.name }}
</p>

<form method="POST">
    <label>Service Name</label><br>
    <input type="text" name="service_name" required>

    <br><br>

    <label>Approved Price</label><br>
    <input type="number" step="0.01" name="approved_price" required>

    <br><br>

    <button type="submit">Add Service</button>
</form>

<br>

<a href="{{ url_for('price_list.review', batch_id=batch.id) }}">Back to Review</a>

{% endblock %}
