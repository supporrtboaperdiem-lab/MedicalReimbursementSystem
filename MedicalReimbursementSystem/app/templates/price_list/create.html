{% extends "base.html" %}

{% block title %}Create Price List Item{% endblock %}

{% block content %}

<h1>Add Service Price</h1>

<form method="POST">
    <label>Institution</label><br>
    <select name="institution_id" required>
        <option value="">Select Institution</option>
        {% for institution in institutions %}
        <option value="{{ institution.id }}">
            {{ institution.name }}
        </option>
        {% endfor %}
    </select>

    <br><br>

    <label>Service Name</label><br>
    <input type="text" name="service_name" required>

    <br><br>

    <label>Approved Price</label><br>
    <input type="number" step="0.01" name="approved_price" required>

    <br><br>

    <button type="submit">Save Service Price</button>
</form>

{% endblock %}
