
{% extends "base.html" %}

{% block title %}Edit Service Price{% endblock %}

{% block content %}

<h1>Edit Service Price</h1>

<p>
    <strong>Institution:</strong> {{ item.institution.name }} <br>
    <strong>Batch:</strong> {{ item.batch.name }}
</p>

<form method="POST">
    <label>Service Name</label><br>
    <input type="text"
           name="service_name"
           value="{{ item.service_name }}"
           required>

    <br><br>

    <label>Approved Price</label><br>
    <input type="number"
           step="0.01"
           name="approved_price"
           value="{{ item.approved_price }}"
           required>

    <br><br>

    <button type="submit">Update</button>
</form>

<br>

<a href="{{ url_for('price_list.review', batch_id=item.batch_id) }}">
    Back to Review
</a>

{% endblock %}
